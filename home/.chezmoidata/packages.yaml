packages:
  common:
    darwin:
      taps: []
      formulae:
        - "git"                        # version control
      casks:
        - "zen"
        - "alt-tab"          # windows-style alt-tab switcher
        - "anki"             # flashcard app
        - "betterdisplay"    # display management
        - "ghostty"          # terminal emulator
        - "obsidian"         # note-taking
        - "orbstack"         # fast Docker / Linux VMs
        - "plexamp"          # music player for Plex
        - "raycast"          # spotlight replacement / launcher
        - "spotify"
        - "visual-studio-code"
        - "utm"
        - "bettertouchtool"
      mas: []
  personal:
    darwin:
      taps: []
      formulae:
        - "mas"              # Mac App Store CLI
      casks:
        - "anki"             # flashcard app
        - "beeper"
        - "crossover"        # run Windows apps on macOS
        - "nextcloud"        # cloud storage client
        - "plex"
        - "screenmemory"     # screen activity recorder
        - "protonvpn"
        - "steam"
        - "whatsapp"
      mas:
        - name: "WireGuard"
          id: 1451685025
  work:
    darwin:
      taps: []
      formulae: []
      casks: []
      mas: [] 

repositories:
  - https://github.com/h-wb/home-ops
  - https://github.com/h-wb/dotfiles
