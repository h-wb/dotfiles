---
description: Keyboard Shortcuts
data:
  com.apple.symbolichotkeys:
    AppleSymbolicHotKeys:
      # 64 = Spotlight search (Cmd-Space) — disabled so Raycast can own it
      "64":
        enabled: false
        value:
          type: standard
          parameters:
            - 32    # space character
            - 49    # space keycode
            - 1048576  # Cmd modifier
