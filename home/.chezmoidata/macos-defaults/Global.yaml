---
description: Global
kill: ["SystemUIServer"]
data:
  NSGlobalDomain:
    # Don't do the annoying press and hold for accents - just repeat the key
    ApplePressAndHoldEnabled: false
    # Fast keyboard repeat rate
    KeyRepeat: 2
    InitialKeyRepeat: 10
    # Show all filename extensions in Finder
    AppleShowAllExtensions: true
    # Expand save panel by default
    NSNavPanelExpandedStateForSaveMode: true
    # Set highlight color to blue
    AppleHighlightColor: "0.698039 0.843137 1.000000"
    # Disable shake to locate cursor
    CGDisableCursorLocationMagnification: 1
    # Trackpad speed (0-3, default 1)
    com.apple.trackpad.scaling: 1
    # Do *NOT* change what I type
    NSAutomaticCapitalizationEnabled: 0
    NSAutomaticDashSubstitutionEnabled: 0
    NSAutomaticPeriodSubstitutionEnabled: 0
    NSAutomaticQuoteSubstitutionEnabled: 0
    NSAutomaticSpellingCorrectionEnabled: 0
    NSInlinePredictionEnabled: 0
